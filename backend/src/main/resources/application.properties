spring.application.name=${APP_NAME:translation-nexus}

# MongoDB
spring.mongodb.uri=${MONGO_DB_URI:mongodb://root:root@localhost:27017/mooka?authSource=admin}

# JWT — change this secret in production (must be >= 32 chars)
jwt.secret=${APP_JWT_SECRET:nexus-secret-key-2024-change-in-prod}
jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Server
server.port=${APP_PORT:8080}

# metrics
app.metrics.name=${APP_METRICS_NAME:translation-nexus}

# google translate
google.api.key=${GOOGLE_TRANSLATE_API_KEY}