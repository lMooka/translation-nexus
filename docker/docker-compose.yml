services:
  mongodb:
    image: mongo:6.0
    container_name: nexus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nexus-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      MONGO_DB_URI: mongodb://root:root@mongodb:27017/nexus?authSource=admin
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-your-key-here}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-nexus-secret-key-2024-change-in-prod}
      APP_SEEDING_ENABLED: ${APP_SEEDING_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:4200}

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: nexus-frontend
    ports:
      - "80:80"
    volumes:
      - ./config.json:/usr/share/nginx/html/config.json
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
